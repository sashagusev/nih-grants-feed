name: Update NIH Grant Data

on:
  # Run daily at 07:00 UTC (midnight Pacific, early morning Eastern)
  schedule:
    - cron: '0 7 * * *'

  # Allow one-click manual run from the Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated data/ files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: Fetch grant data
        env:
          # Optional but strongly recommended: add a free API key from
          # https://simpler.grants.gov/developer as a GitHub repository
          # secret named GRANTS_API_KEY.  Without it the script falls
          # back to HTML scraping which may be less reliable.
          GRANTS_API_KEY: ${{ secrets.GRANTS_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit when something actually changed
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: refresh NIH grant data $(date -u +'%Y-%m-%d')"
            git push
          fi
